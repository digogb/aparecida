# Nginx config para servir o SPA React dentro do container frontend.
# Este arquivo é diferente do nginx principal (nginx/nginx.conf).
# Apenas serve arquivos estáticos e redireciona tudo para index.html.

server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # index.html NUNCA deve ser cacheado: é o documento que aponta para os chunks com hash.
    # Sem isso, o navegador serve um index.html antigo após o deploy e tenta carregar chunks
    # que não existem mais (404 em imports dinâmicos / cai na versão antiga após login).
    # no-cache = pode guardar, mas revalida com o servidor antes de usar (304 se inalterado).
    location = /index.html {
        add_header Cache-Control "no-cache";
    }

    # Assets com cache longo (Vite gera nomes com hash)
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
