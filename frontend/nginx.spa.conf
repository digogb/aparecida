# Nginx config para servir o SPA React dentro do container frontend.
# Este arquivo é diferente do nginx principal (nginx/nginx.conf).
# Apenas serve arquivos estáticos e redireciona tudo para index.html.

server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Assets com cache longo (Vite gera nomes com hash)
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
