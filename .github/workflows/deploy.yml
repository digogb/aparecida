name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # -------------------------------------------------------
  # Testes — roda no runner x86 do GitHub (gratuito)
  # -------------------------------------------------------
  test:
    name: Testes
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: ione
          POSTGRES_PASSWORD: test
          POSTGRES_DB: ione_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Instalar dependências Python
        working-directory: backend
        run: pip install -r requirements.txt

      - name: Rodar testes backend
        working-directory: backend
        env:
          DATABASE_URL: postgresql+asyncpg://ione:test@localhost:5432/ione_test
          JWT_SECRET: test-secret-ci
          ANTHROPIC_API_KEY: dummy
          ENV: test
        run: pytest tests/ -v --tb=short

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Instalar dependências Node
        working-directory: frontend
        run: npm ci

      - name: Lint frontend
        working-directory: frontend
        run: npm run lint || true   # não bloqueia por enquanto

      - name: Build frontend (verifica se compila)
        working-directory: frontend
        env:
          VITE_API_URL: ""
        run: npm run build

  # -------------------------------------------------------
  # Deploy — roda somente em push na main, após testes
  # -------------------------------------------------------
  deploy:
    name: Deploy na VM OCI
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.OCI_HOST }}
          username: ${{ secrets.OCI_USER }}
          key: ${{ secrets.OCI_SSH_KEY }}
          port: 22
          script: |
            set -e
            cd /opt/ione

            echo "==> Atualizando código..."
            git pull origin main

            echo "==> Subindo containers..."
            docker compose -f docker-compose.prod.yml up -d --build --remove-orphans

            echo "==> Removendo imagens antigas..."
            docker image prune -f

            echo "==> Status dos containers:"
            docker compose -f docker-compose.prod.yml ps

            echo "==> Deploy concluído."
