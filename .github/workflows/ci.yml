name: CI

on:
  pull_request:
  push:
    branches: [master, dev]

jobs:
  # --------------------------------------------------
  # Lint (1 min)
  # --------------------------------------------------
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Instalar ruff
        run: pip install ruff

      - name: Ruff (backend)
        working-directory: backend
        run: ruff check app/

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: npm ci
        working-directory: frontend
        run: npm ci

      - name: TypeScript (frontend)
        working-directory: frontend
        run: npm run lint

  # --------------------------------------------------
  # Backend – testes unitários (2 min, sem DB)
  # --------------------------------------------------
  backend-unit:
    name: Backend — unit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Instalar dependências
        working-directory: backend
        run: pip install -r requirements.txt

      - name: pytest unit/
        working-directory: backend
        env:
          DATABASE_URL: sqlite+aiosqlite:///:memory:
          JWT_SECRET: ci-secret
          ANTHROPIC_API_KEY: dummy
          ENV: test
        run: |
          pytest tests/unit/ -v \
            --cov=app/services --cov=app/schemas \
            --cov-report=term-missing \
            --cov-fail-under=50

  # --------------------------------------------------
  # Backend – testes de integração (5 min, com Postgres)
  # --------------------------------------------------
  backend-integration:
    name: Backend — integração
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: ione
          POSTGRES_PASSWORD: test
          POSTGRES_DB: ione_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Instalar dependências
        working-directory: backend
        run: pip install -r requirements.txt

      - name: pytest (exceto unit/)
        working-directory: backend
        env:
          DATABASE_URL: postgresql+asyncpg://ione:test@localhost:5432/ione_test
          JWT_SECRET: ci-secret
          ANTHROPIC_API_KEY: dummy
          ENV: test
        run: pytest tests/ --ignore=tests/unit/ -v --tb=short

  # --------------------------------------------------
  # Frontend – testes unitários (2 min)
  # --------------------------------------------------
  frontend-unit:
    name: Frontend — unit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: npm ci
        working-directory: frontend
        run: npm ci

      - name: Vitest
        working-directory: frontend
        run: npm test

  # --------------------------------------------------
  # Frontend – build (2 min)
  # --------------------------------------------------
  frontend-build:
    name: Frontend — build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: npm ci
        working-directory: frontend
        run: npm ci

      - name: Build
        working-directory: frontend
        env:
          VITE_API_URL: ""
        run: npm run build

  # --------------------------------------------------
  # E2E – Playwright Chromium (8 min, stack completa)
  # --------------------------------------------------
  e2e:
    name: E2E — Playwright
    runs-on: ubuntu-latest
    needs: [backend-integration, frontend-build]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: npm ci
        working-directory: frontend
        run: npm ci

      - name: Instalar Playwright browsers
        working-directory: frontend
        run: npx playwright install --with-deps chromium

      - name: Subir stack (docker compose)
        run: |
          cp .env.example .env || true
          docker compose up -d --build
          # Aguarda backend ficar pronto
          timeout 120 bash -c 'until curl -sf http://localhost/api/health; do sleep 3; done'

      - name: Playwright tests
        working-directory: frontend
        env:
          BASE_URL: http://localhost
        run: npm run test:e2e

      - name: Upload artefatos de falha
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 7

  # --------------------------------------------------
  # Segurança (paralelo)
  # --------------------------------------------------
  security:
    name: Segurança
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: npm ci
        working-directory: frontend
        run: npm ci

      - name: npm audit
        working-directory: frontend
        run: npm audit --audit-level=high || true

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: pip-audit
        working-directory: backend
        run: |
          pip install pip-audit
          pip-audit -r requirements.txt --ignore-vuln PYSEC-2022-42969 || true
