events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    server_tokens off;

    # Resolve nomes via DNS interno do Docker a cada 30s (evita IP stale após restart de containers)
    resolver 127.0.0.11 valid=30s ipv6=off;

    # Aumenta timeout para uploads de .eml com anexos grandes
    client_max_body_size 50M;
    proxy_read_timeout   120s;
    proxy_send_timeout   120s;

    # Rate limit para endpoints de autenticação (brute-force protection)
    limit_req_zone $binary_remote_addr zone=auth_zone:10m rate=5r/m;

    server {
        listen 80;
        server_name ione.rglabs.tech;

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    server {
        listen 443 ssl;
        server_name ione.rglabs.tech;

        ssl_certificate     /etc/letsencrypt/live/ione.rglabs.tech/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/ione.rglabs.tech/privkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;

        # Security headers
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;

        client_max_body_size 50M;
        proxy_read_timeout   120s;
        proxy_send_timeout   120s;

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location /ws/ {
            set $backend backend:8000;
            proxy_pass         http://$backend;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade    $http_upgrade;
            proxy_set_header   Connection "upgrade";
            proxy_set_header   Host       $host;
        }

        location /api/auth/ {
            limit_req zone=auth_zone burst=5 nodelay;
            set $backend backend:8000;
            proxy_pass         http://$backend;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }

        location /api/ {
            set $backend backend:8000;
            proxy_pass         http://$backend;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }

        location / {
            set $frontend frontend:80;
            proxy_pass       http://$frontend;
            proxy_set_header Host $host;
        }
    }
}
