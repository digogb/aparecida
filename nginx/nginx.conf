events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile      on;

    # Aumenta timeout para uploads de .eml com anexos grandes
    client_max_body_size 50M;
    proxy_read_timeout   120s;
    proxy_send_timeout   120s;

    upstream backend  { server backend:8000; }
    upstream frontend { server frontend:80;  }

    # -------------------------------------------------------
    # HTTP — redireciona para HTTPS quando SSL estiver ativo.
    # Antes de configurar o SSL, este bloco serve a aplicação.
    # -------------------------------------------------------
    server {
        listen 80;
        server_name ione.rglabs.tech;

        # Desafio do Let's Encrypt (certbot webroot)
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        # Descomente o bloco abaixo SOMENTE depois de ter o certificado SSL:
        # location / {
        #     return 301 https://$host$request_uri;
        # }

        # WebSocket (FastAPI nativo)
        location /ws/ {
            proxy_pass         http://backend;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade    $http_upgrade;
            proxy_set_header   Connection "upgrade";
            proxy_set_header   Host       $host;
        }

        # API REST
        location /api/ {
            proxy_pass         http://backend;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }

        # Frontend SPA
        location / {
            proxy_pass       http://frontend;
            proxy_set_header Host $host;
        }
    }

    # -------------------------------------------------------
    # HTTPS — descomente este bloco após obter o certificado.
    # -------------------------------------------------------
    # server {
    #     listen 443 ssl;
    #     server_name ione.rglabs.tech;
