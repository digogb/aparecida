version: "3.9"

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ione
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ione
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ione"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./uploads:/app/uploads
    environment:
      DATABASE_URL: postgresql+asyncpg://ione:${DB_PASSWORD}@db:5432/ione
      JWT_SECRET: ${JWT_SECRET}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      GMAIL_SENDER_EMAIL: ${GMAIL_SENDER_EMAIL:-}
      GMAIL_CLIENT_ID: ${GMAIL_CLIENT_ID:-}
      GMAIL_CLIENT_SECRET: ${GMAIL_CLIENT_SECRET:-}
      GMAIL_REFRESH_TOKEN: ${GMAIL_REFRESH_TOKEN:-}
      GMAIL_TEST_RECIPIENT: ${GMAIL_TEST_RECIPIENT:-}
      DJE_NUMERO_OAB: ${DJE_NUMERO_OAB:-}
      ENV: production
    command: >
      sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000"

  nginx:
    build:
      context: ./frontend
      args:
        VITE_API_URL: https://${DOMAIN}
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - ./nginx/ssl.conf:/etc/nginx/conf.d/ssl.conf:ro

volumes:
  pgdata:
